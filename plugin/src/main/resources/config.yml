#
# type은 "main" or "sub"중 하나만 선택 해주세요
# 서버가 하나일 경우, "main"을 입력해주세요
#
Server:
  type: "main"
  host: "0.0.0.0"
  port: 8888

#
# 숲, 치지직의 Open API Key를 입력하는 곳 입니다.
#
APIKey:
  Soop:
    id: "id"
    secret: "secret"
  Chzzk:
    id: "id"
    secret: "secret"

#
# 중간 API Server가 있는 플랫폼 API Server 주소 설정
#
APIServer:
  Soop:
    nodejs: "localhost:3000"